name: Publish

on:
  push:
    branches: [ main, 'feature/**' ]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')
          BASE_VERSION="${BASE_VERSION%-SNAPSHOT}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE_VERSION}-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: ${BASE_VERSION}"

      - name: Build, test, and deploy
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/bvarner/shimaging-devcontainer
          env: |
            GITHUB_ACTOR
            GITHUB_TOKEN
          runCmd: |
            ./mvnw -B deploy \
              -Drevision=${{ steps.version.outputs.version }} \
              --settings .github/settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shimaging-${{ steps.version.outputs.version }}
          path: |
            target/shimaging-*.jar
          retention-days: 30
