name: Devcontainer Prebuild

on:
  push:
    branches: [ main ]
    paths:
      - '.devcontainer/**'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild and push devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/bvarner/shimaging-devcontainer
          cacheFrom: ghcr.io/bvarner/shimaging-devcontainer
          push: always

